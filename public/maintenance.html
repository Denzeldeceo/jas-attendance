<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAS Studios — System Unavailable</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #0d0700;
      font-family: 'Outfit', sans-serif; color: white;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; text-align: center;
    }
    .card {
      background: rgba(18,10,0,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px; padding: 48px 36px;
      max-width: 420px; width: 100%;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px; color: #FF6B00;
      letter-spacing: 3px; margin-bottom: 6px;
    }
    .sub {
      font-size: 11px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
      margin-bottom: 36px;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 {
      font-size: 20px; font-weight: 700; margin-bottom: 14px;
      color: white;
    }
    p {
      font-size: 14px; color: rgba(255,255,255,0.45);
      line-height: 1.7; margin-bottom: 28px;
    }
    .badge {
      display: inline-block;
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.25);
      color: #ff8888; border-radius: 99px;
      padding: 8px 20px; font-size: 12px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">JAS</div>
    <div class="sub">Photography & Glam Salon</div>
    <div class="icon">🔒</div>
    <h1>System Temporarily Unavailable</h1>
    <p>The attendance system is currently offline. Please contact your Tech for assistance.</p>
    <div class="badge">● System Offline</div>
  </div>
</body>
</html>
