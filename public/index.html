<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FF6B00">
  <title>JAS Studios | Staff Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00;
      --orange-glow: rgba(255,107,0,0.35);
    }
    html, body { min-height: 100vh; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }

    .bg-fixed { position: fixed; inset: 0; z-index: 0; }
    .bg-fixed img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(2px) brightness(0.35) saturate(0.9);
      transform: scale(1.05);
    }
    .bg-fixed::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,107,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
    }

    body { display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }

    .container {
      position: relative; z-index: 2;
      width: min(480px, 100%);
      display: flex; flex-direction: column; align-items: center;
    }

    .header { text-align: center; margin-bottom: 18px; width: 100%; }
    .header-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem; letter-spacing: 6px; color: white;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5); line-height: 1;
    }
    .header-sub { font-size: 11px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .header-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: white; margin-top: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.4); }
    .header-status {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 10px;
      background: rgba(74,222,128,0.2); border: 1px solid rgba(74,222,128,0.4);
      border-radius: 99px; padding: 6px 16px;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #4ade80; text-transform: uppercase;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

    /* GPS badge */
    .gps-badge {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 8px;
      border-radius: 99px; padding: 5px 14px;
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      transition: all 0.4s ease;
    }
    .gps-badge.checking { background: rgba(148,163,184,0.15); border: 1px solid rgba(148,163,184,0.3); color: #94a3b8; }
    .gps-badge.ok       { background: rgba(74,222,128,0.15);  border: 1px solid rgba(74,222,128,0.3);  color: #4ade80; }
    .gps-badge.far      { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
    .gps-badge.denied   { background: rgba(251,191,36,0.15);  border: 1px solid rgba(251,191,36,0.3);  color: #fbbf24; }
    .gps-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .gps-badge.checking .gps-dot { animation: pulse 1.2s infinite; }

    /* Device lock banner */
    .device-banner {
      display: none; width: 100%; margin-bottom: 14px;
      background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.35);
      border-radius: 14px; padding: 12px 16px;
      font-size: 12px; font-weight: 600; color: #fbbf24;
      text-align: center; line-height: 1.6; letter-spacing: 0.3px;
    }
    .device-banner.show { display: block; }

    .card {
      background: rgba(12, 6, 0, 0.82);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
      padding: 28px 24px 24px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .pin-label { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
    .pin-dots { display: flex; justify-content: center; gap: 16px; margin-bottom: 22px; }
    .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); background: transparent; transition: all 0.15s; }
    .pin-dot.filled { background: var(--orange); border-color: var(--orange); transform: scale(1.2); box-shadow: 0 0 10px var(--orange-glow); }

    .action-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .action-tab {
      flex: 1; padding: 13px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.4);
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .action-tab.active { background: var(--orange); color: white; border-color: var(--orange); box-shadow: 0 4px 18px var(--orange-glow); }

    /* Keypad lock overlay */
    .keypad-wrap { position: relative; }
    .keypad-lock {
      position: absolute; inset: 0; z-index: 5;
      background: rgba(12,6,0,0.75);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.3s;
    }
    .keypad-lock.hidden { opacity: 0; pointer-events: none; }
    .lock-icon { font-size: 2rem; }
    .lock-text { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); text-align: center; letter-spacing: 0.5px; line-height: 1.5; }
    .lock-retry {
      margin-top: 4px; padding: 8px 20px; border-radius: 10px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6); font-family: 'Outfit', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .lock-retry:hover { background: rgba(255,255,255,0.15); }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
    .key {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 18px 10px;
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: white;
      cursor: pointer; text-align: center; transition: all 0.1s; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .key:active { background: var(--orange); border-color: var(--orange); transform: scale(0.93); }
    .key-erase { font-size: 0.85rem; font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: 0.5px; color: rgba(255,100,100,0.8); }
    .key-back { font-size: 1.4rem; }

    .status-msg { margin-top: 14px; padding: 13px 18px; border-radius: 12px; text-align: center; font-size: 13px; font-weight: 600; min-height: 20px; }
    .status-msg.success { background: rgba(74,222,128,0.15); color: #4ade80; }
    .status-msg.error   { background: rgba(248,113,113,0.15); color: #f87171; }
    .status-msg.empty   { background: transparent; }

    .admin-link {
      display: block; text-align: center; margin-top: 18px;
      font-size: 11px; font-weight: 600; letter-spacing: 2px;
      color: rgba(255,255,255,0.2); text-decoration: none; text-transform: uppercase;
      transition: color 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .admin-link:hover { color: var(--orange); }
  </style>
</head>
<body>

<div class="bg-fixed"><img src="/pricing-bg.jpg" alt=""></div>

<div class="container">
  <div class="header">
    <div class="header-logo">STAFF ATTENDANCE</div>
    <div class="header-sub">Photography &amp; Glam Salon</div>
    <div class="header-time" id="headerTime"></div>
    <div class="header-status">
      <span class="status-dot"></span>
      <span id="statusLabel">ON TIME — CLOCK-IN OPEN UNTIL 9:45 AM</span>
    </div>
    <div class="gps-badge checking" id="gpsBadge">
      <span class="gps-dot"></span>
      <span id="gpsLabel">Checking location…</span>
    </div>
  </div>

  <!-- Device-locked banner (shown when device is claimed by someone else today) -->
  <div class="device-banner" id="deviceBanner"></div>

  <div class="card">
    <div class="pin-label">Enter your 4-digit PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>

    <div class="action-tabs">
      <button class="action-tab active" id="tabIn"  onclick="setMode('in')">Clock In</button>
      <button class="action-tab"        id="tabOut" onclick="setMode('out')">Clock Out</button>
    </div>

    <div class="keypad-wrap">
      <!-- Lock overlay -->
      <div class="keypad-lock" id="keypadLock">
        <div class="lock-icon">📍</div>
        <div class="lock-text" id="lockText">You must be at the workplace<br>to sign in or out</div>
        <button class="lock-retry" id="lockRetryBtn" onclick="checkLocation()">Retry Location</button>
      </div>

      <div class="keypad">
        <div class="key" onclick="kPress('1')">1</div>
        <div class="key" onclick="kPress('2')">2</div>
        <div class="key" onclick="kPress('3')">3</div>
        <div class="key" onclick="kPress('4')">4</div>
        <div class="key" onclick="kPress('5')">5</div>
        <div class="key" onclick="kPress('6')">6</div>
        <div class="key" onclick="kPress('7')">7</div>
        <div class="key" onclick="kPress('8')">8</div>
        <div class="key" onclick="kPress('9')">9</div>
        <div class="key key-erase" onclick="kClear()">ERASE<br>ALL</div>
        <div class="key"           onclick="kPress('0')">0</div>
        <div class="key key-back"  onclick="kBack()">⌫</div>
      </div>
    </div>

    <div class="status-msg empty" id="statusMsg"></div>
  </div>

  <a class="admin-link" href="/admin.html">🔒 Admin Access</a>
</div>

<script>
  // ─────────────────────────────────────────────
  // EDIT THESE VALUES:
  const WORKPLACE_LAT    = 6.2769144;
  const WORKPLACE_LNG    = -10.6892312;
  const ALLOWED_RADIUS_M = 200;
  // Work hours: 9:00 AM – 8:00 PM, 7 days a week
  const WORK_START_HOUR  = 9;
const WORK_END_HOUR    = 23;  // 11 PM
  // ─────────────────────────────────────────────

  let pin        = '';
  let mode       = 'in';
  let locationOk = false;
  let deviceId   = getOrCreateDeviceId();

  // ── Device fingerprint ──────────────────────────────────────────────────────
  // A stable ID stored in localStorage so the same browser/device always
  // sends the same identifier. It resets each calendar day on the SERVER
  // side, so the restriction is per-day automatically.
  function getOrCreateDeviceId() {
    const key = 'jas_device_id';
    let id = localStorage.getItem(key);
    if (!id) {
      // Generate a random UUID-style string
      id = 'dev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(key, id);
    }
    return id;
  }

  // ── Clock ──────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('headerTime').textContent = dateStr + ' · ' + timeStr;

    const h = now.getHours(), m = now.getMinutes();
    const statusEl = document.getElementById('statusLabel');
    const dotEl    = document.querySelector('.status-dot');
    const badgeEl  = dotEl.parentElement;

    if (h < WORK_START_HOUR) {
      // Before work hours
      statusEl.textContent = 'NOT YET OPEN — OPENS AT 9:00 AM';
      dotEl.style.background = '#94a3b8';
      badgeEl.style.background = 'rgba(148,163,184,0.2)';
      badgeEl.style.borderColor = 'rgba(148,163,184,0.4)';
      badgeEl.style.color = '#94a3b8';
    } else if (h >= WORK_END_HOUR) {
      // After work hours
      statusEl.textContent = 'CLOSED — SHIFT ENDED AT 11:00 AM';
      dotEl.style.background = '#f87171';
      badgeEl.style.background = 'rgba(248,113,113,0.2)';
      badgeEl.style.borderColor = 'rgba(248,113,113,0.4)';
      badgeEl.style.color = '#f87171';
    } else if (h > 9 || (h === 9 && m > 45)) {
      // Late
      statusEl.textContent = 'LATE — CUTOFF WAS 9:45 AM';
      dotEl.style.background = '#fbbf24';
      badgeEl.style.background = 'rgba(251,191,36,0.2)';
      badgeEl.style.borderColor = 'rgba(251,191,36,0.4)';
      badgeEl.style.color = '#fbbf24';
    } else {
      statusEl.textContent = 'ON TIME — CLOCK-IN OPEN UNTIL 9:45 AM';
      dotEl.style.background = '#4ade80';
      badgeEl.style.background = 'rgba(74,222,128,0.2)';
      badgeEl.style.borderColor = 'rgba(74,222,128,0.4)';
      badgeEl.style.color = '#4ade80';
    }
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Haversine distance (metres) ────────────────────────────────────────────
  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── GPS badge ──────────────────────────────────────────────────────────────
  function setGpsBadge(state, text) {
    const badge = document.getElementById('gpsBadge');
    const label = document.getElementById('gpsLabel');
    badge.className = 'gps-badge ' + state;
    label.textContent = text;
  }

  // ── Keypad lock overlay ────────────────────────────────────────────────────
  // reason: HTML string for .lock-text
  // showRetry: whether to show the "Retry Location" button
  function setKeypadLocked(locked, reason, showRetry = true) {
    const lock    = document.getElementById('keypadLock');
    const textEl  = document.getElementById('lockText');
    const retryEl = document.getElementById('lockRetryBtn');
    if (locked) {
      textEl.innerHTML  = reason || 'You must be at the workplace<br>to sign in or out';
      retryEl.style.display = showRetry ? '' : 'none';
      lock.classList.remove('hidden');
    } else {
      lock.classList.add('hidden');
    }
  }

  // ── Device banner ──────────────────────────────────────────────────────────
  function showDeviceBanner(msg) {
    const el = document.getElementById('deviceBanner');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideDeviceBanner() {
    document.getElementById('deviceBanner').classList.remove('show');
  }

  // ── Location check ─────────────────────────────────────────────────────────
  function checkLocation() {
    setGpsBadge('checking', 'Checking location…');
    setKeypadLocked(true, 'Verifying your location…<br>Please wait', false);

    if (!navigator.geolocation) {
      setGpsBadge('denied', 'GPS not supported');
      setKeypadLocked(true, 'This device does not support GPS.<br>Please use a GPS-enabled device.', false);
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        const dist = Math.round(getDistance(
          pos.coords.latitude, pos.coords.longitude,
          WORKPLACE_LAT, WORKPLACE_LNG
        ));
        if (dist <= ALLOWED_RADIUS_M) {
          locationOk = true;
          setGpsBadge('ok', `📍 On-site — ${dist}m from workplace`);
          setKeypadLocked(false);
          checkWorkHours();   // enforce hours after GPS passes
        } else {
          locationOk = false;
          setGpsBadge('far', `📍 Too far — ${dist}m away`);
          setKeypadLocked(true, `You are ${dist}m from the workplace.<br>You must be within ${ALLOWED_RADIUS_M}m to sign in.`);
        }
      },
      err => {
        locationOk = false;
        const msgs = {
          1: 'Location access denied.<br>Please allow location in your browser.',
          2: 'Location unavailable.<br>Check your GPS signal and retry.',
          3: 'Location timed out.<br>Please retry.',
        };
        setGpsBadge('denied', 'Location access denied');
        setKeypadLocked(true, msgs[err.code] || 'Location error. Please retry.');
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  // ── Work hours gate (9 AM – 8 PM) ─────────────────────────────────────────
  function checkWorkHours() {
    const now = new Date();
    const h   = now.getHours();
    if (h < WORK_START_HOUR || h >= WORK_END_HOUR) {
      // Outside work hours — lock keypad even if on-site
      locationOk = false;
      setKeypadLocked(true,
        `The attendance system is only active<br>from 9:00 AM to 12:00 AM.<br>Please come back during work hours.`,
        false
      );
    }
    // else: locationOk already set true by GPS check, keypad is unlocked
  }

  // Run on load
  checkLocation();
  // Re-check GPS every 2 minutes
  setInterval(checkLocation, 120000);
  // Re-check work hours every minute (in case they stay on the page)
  setInterval(checkWorkHours, 60000);

  // ── Mode ───────────────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    document.getElementById('tabIn').classList.toggle('active',  m === 'in');
    document.getElementById('tabOut').classList.toggle('active', m === 'out');
  }

  // ── PIN ────────────────────────────────────────────────────────────────────
  function updateDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById('dot' + i).classList.toggle('filled', i < pin.length);
  }
  function kPress(d) {
    if (!locationOk) { showMsg('📍 Location not verified — cannot sign in', 'error'); return; }
    if (pin.length >= 4) return;
    pin += d; updateDots();
    if (pin.length === 4) setTimeout(submit, 150);
  }
  function kBack()  { pin = pin.slice(0,-1); updateDots(); }
  function kClear() { pin = ''; updateDots(); }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') kPress(e.key);
    else if (e.key === 'Backspace') kBack();
    else if (e.key === 'Delete' || e.key === 'Escape') kClear();
  });

  // ── Status msg ─────────────────────────────────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = text; el.className = 'status-msg ' + type;
    setTimeout(() => { if (el.textContent === text) { el.textContent=''; el.className='status-msg empty'; } }, 4000);
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submit() {
    if (!locationOk) { showMsg('📍 Location not verified — cannot sign in', 'error'); kClear(); return; }

    // Work hours double-check on client side
    const now = new Date();
    const h   = now.getHours();
    if (h < WORK_START_HOUR || h >= WORK_END_HOUR) {
      showMsg('⏰ Outside work hours (9 AM – 8 PM)', 'error');
      kClear(); return;
    }

    const submittedPin = pin; kClear();
    const endpoint = mode === 'in' ? '/api/clock-in' : '/api/clock-out';
    const timeNow  = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          staffPin: submittedPin,
          deviceId: deviceId          // ← sent on every request
        })
      });
      const data = await res.json();

      if (res.ok) {
        hideDeviceBanner();
        showMsg(data.message || '✅ ' + (mode === 'in' ? 'Clocked IN' : 'Clocked OUT') + ' at ' + timeNow, 'success');
      } else {
        // 409 = device already claimed by another employee today
        if (res.status === 409) {
          showDeviceBanner('⚠️ ' + (data.error || 'This device is already registered to another employee today.'));
        }
        showMsg(data.error || 'Something went wrong', 'error');
      }
    } catch {
      showMsg('⚠️ Network error — please try again', 'error');
    }
  }
</script>
<script src="/transition.js"></script>
</body>
</html>
